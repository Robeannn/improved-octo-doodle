
<style>
  .scene{padding:2rem 1rem 1.5rem;font-family:var(--font-sans);}
  .shelf-section{margin-bottom:2.8rem;}
  .section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-align:center;margin:0 0 0.3rem;}
  .section-hint{font-size:11px;color:var(--color-text-tertiary);text-align:center;margin:0 0 1rem;letter-spacing:.04em;text-transform:uppercase;}
  .shelf-wrapper{position:relative;display:flex;justify-content:center;}
  .shelf{display:flex;align-items:flex-end;gap:14px;padding:20px 36px 0;position:relative;z-index:1;}
  .plank{position:absolute;bottom:-14px;left:0;right:0;height:14px;background:#7a5c3a;border-radius:0 0 4px 4px;box-shadow:0 4px 10px rgba(0,0,0,.22);z-index:0;}
  .plank::before{content:'';position:absolute;inset:0;border-top:2px solid #a8784a;border-radius:0 0 4px 4px;}
  .book{cursor:pointer;transition:transform .3s cubic-bezier(.4,0,.2,1);user-select:none;position:relative;}
  .book:hover{transform:translateY(-8px) rotate(-1.5deg);}
  .book.open{transform:none!important;}
  .book-body{border-radius:2px 5px 5px 2px;position:relative;overflow:hidden;box-shadow:3px 3px 10px rgba(0,0,0,.28),inset -4px 0 8px rgba(0,0,0,.14);}
  .book-pages{position:absolute;right:-4px;top:4px;bottom:4px;width:5px;background:repeating-linear-gradient(to bottom,#ede3cc 0,#ede3cc 2px,#d5c9a8 2px,#d5c9a8 3px);border-radius:0 2px 2px 0;}
  .book-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none;}
  .book-label span{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-size:10px;font-weight:500;color:rgba(255,255,255,.92);letter-spacing:.07em;text-shadow:0 1px 3px rgba(0,0,0,.5);padding:6px 0;line-height:1.3;text-align:center;}
  .want .book-body{opacity:.78;}
  .want .book:hover .book-body{opacity:1;}
  .bm{position:absolute;top:-5px;right:8px;width:9px;height:16px;background:#d4891a;clip-path:polygon(0 0,100% 0,100% 82%,50% 100%,0 82%);z-index:4;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:100;align-items:center;justify-content:center;padding:1rem;}
  .overlay.active{display:flex;animation:fi .2s ease;}
  @keyframes fi{from{opacity:0}to{opacity:1}}
  .card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);max-width:400px;width:100%;overflow:hidden;animation:su .28s cubic-bezier(.4,0,.2,1);position:relative;}
  @keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .card-top{padding:1.1rem 1.1rem .9rem;border-bottom:.5px solid var(--color-border-tertiary);display:flex;gap:14px;align-items:flex-start;}
  .card-mini{width:32px;height:50px;border-radius:2px 4px 4px 2px;flex-shrink:0;box-shadow:2px 2px 5px rgba(0,0,0,.22);overflow:hidden;}
  .card-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin:0 0 2px;}
  .card-author{font-size:12px;color:var(--color-text-secondary);margin:0 0 6px;}
  .stars{display:flex;gap:3px;}
  .star{width:13px;height:13px;}
  .card-body{padding:.9rem 1.1rem;}
  .tag{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:var(--border-radius-md);margin-bottom:9px;}
  .card-text{font-size:13px;color:var(--color-text-secondary);line-height:1.75;margin:0 0 10px;}
  .verdict{font-size:12px;font-weight:500;border-left:3px solid;padding-left:9px;margin:0;color:var(--color-text-primary);}
  .pages-note{font-size:11px;color:var(--color-text-tertiary);margin:8px 0 0;}
  .close-btn{position:absolute;top:10px;right:10px;background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-secondary);transition:background .15s;font-size:14px;}
  .close-btn:hover{background:var(--color-background-tertiary);}
</style>

<h2 class="sr-only">Bookshelf — Read shelf: Will of the Many, Pachinko, Red Rising. Want to read shelf: Babel, The Long Way to a Small Angry Planet, Demon Copperhead.</h2>

<div class="scene">
  <div class="shelf-section">
    <p class="section-title">Read</p>
    <p class="section-hint">click to open</p>
    <div class="shelf-wrapper"><div class="shelf" id="sr"></div><div class="plank"></div></div>
  </div>
  <div class="shelf-section">
    <p class="section-title">Want to read</p>
    <p class="section-hint">click for a blurb</p>
    <div class="shelf-wrapper"><div class="shelf want" id="sw"></div><div class="plank"></div></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="card">
    <button class="close-btn" onclick="closeOverlay()" aria-label="Close"><i class="ti ti-x" aria-hidden="true"></i></button>
    <div class="card-top">
      <div class="card-mini"><canvas id="rv-c" width="32" height="50"></canvas></div>
      <div>
        <p class="card-title" id="rv-t"></p>
        <p class="card-author" id="rv-a"></p>
        <div class="stars" id="rv-s"></div>
      </div>
    </div>
    <div class="card-body">
      <span class="tag" id="rv-tag"></span>
      <p class="card-text" id="rv-tx"></p>
      <p class="verdict" id="rv-v"></p>
      <p class="pages-note" id="rv-p"></p>
    </div>
  </div>
</div>

<script>
const BASE=672, BW=52;
function pw(p){return Math.round(BW*p/BASE);}

const painters={
  wotm:(c,w,h)=>{
    c.fillStyle='#0e1a38';c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(200,165,60,.45)';c.lineWidth=.5;
    for(let y=0;y<h;y+=10){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
    for(let x=0;x<w;x+=10){c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke();}
    c.strokeStyle='rgba(215,178,68,.7)';c.lineWidth=.9;
    c.beginPath();c.moveTo(0,h*.28);c.lineTo(w,h*.2);c.stroke();
    c.beginPath();c.moveTo(0,h*.72);c.lineTo(w,h*.78);c.stroke();
    const cx=w/2,cy=h/2,s=Math.min(w*.42,20);
    c.strokeStyle='rgba(225,188,75,.88)';c.lineWidth=1.2;
    [s,s*.6].forEach(r=>{c.beginPath();c.moveTo(cx,cy-r);c.lineTo(cx+r,cy);c.lineTo(cx,cy+r);c.lineTo(cx-r,cy);c.closePath();c.stroke();});
    c.fillStyle='rgba(235,198,82,.9)';c.beginPath();c.arc(cx,cy,2,0,Math.PI*2);c.fill();
  },
  pachinko:(c,w,h)=>{
    c.fillStyle='#1a4a42';c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(255,255,255,.07)';c.lineWidth=.5;
    for(let y=0;y<h;y+=8){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
    const cx=w/2;
    c.strokeStyle='rgba(180,230,200,.65)';c.lineWidth=.8;
    c.beginPath();c.moveTo(cx,h*.85);c.lineTo(cx,h*.15);c.stroke();
    c.beginPath();c.moveTo(cx,h*.55);c.quadraticCurveTo(cx-w*.6,h*.4,cx-w*.35,h*.3);c.stroke();
    c.beginPath();c.moveTo(cx,h*.45);c.quadraticCurveTo(cx+w*.6,h*.32,cx+w*.35,h*.22);c.stroke();
    c.fillStyle='rgba(200,240,215,.8)';
    [[cx,h*.15],[cx-w*.35,h*.3],[cx+w*.35,h*.22]].forEach(([x,y])=>{c.beginPath();c.arc(x,y,2.5,0,Math.PI*2);c.fill();});
    c.strokeStyle='rgba(160,220,185,.55)';c.lineWidth=.7;
    [[cx,h*.65,-1],[cx,h*.75,1]].forEach(([x,y,d])=>{c.beginPath();c.moveTo(x,y);c.quadraticCurveTo(x+d*w*.5,y-8,x+d*w*.3,y-4);c.quadraticCurveTo(x+d*w*.1,y+2,x,y);c.stroke();});
  },
  redrising:(c,w,h)=>{
    c.fillStyle='#5c0a0a';c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(255,255,255,.05)';c.lineWidth=.5;
    for(let y=0;y<h;y+=7){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
    const cx=w/2,cy=h*.44,g=c.createRadialGradient(cx,cy,2,cx,cy,w*1.2);
    g.addColorStop(0,'rgba(200,50,30,.45)');g.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g;c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(230,180,50,.55)';c.lineWidth=.7;
    for(let a=0;a<Math.PI*2;a+=Math.PI/6){c.beginPath();c.moveTo(cx+Math.cos(a)*5,cy+Math.sin(a)*5);c.lineTo(cx+Math.cos(a)*14,cy+Math.sin(a)*14);c.stroke();}
    c.strokeStyle='rgba(230,180,50,.75)';c.lineWidth=1;
    c.beginPath();c.arc(cx,cy,8,0,Math.PI*2);c.stroke();
    c.strokeStyle='rgba(240,195,60,.88)';c.lineWidth=1.3;
    c.beginPath();c.moveTo(cx-4,cy+h*.2);c.quadraticCurveTo(cx-w*.3,cy-h*.05,cx+3,cy-5);c.stroke();
    c.beginPath();c.moveTo(cx+3,cy-5);c.quadraticCurveTo(cx+w*.35,cy-h*.08,cx+2,cy+4);c.stroke();
  },
  babel:(c,w,h)=>{
    c.fillStyle='#1a0e30';c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(180,150,230,.2)';c.lineWidth=.5;
    for(let y=0;y<h;y+=9){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
    c.fillStyle='rgba(130,100,200,.35)';
    c.fillRect(w*.3,h*.45,w*.4,h*.5);c.fillRect(w*.37,h*.35,w*.26,h*.12);c.fillRect(w*.43,h*.28,w*.14,h*.1);
    c.fillStyle='rgba(220,200,255,.7)';
    [[.2,.12],[.75,.08],[.5,.05],[.15,.25],[.82,.2]].forEach(([rx,ry])=>{c.beginPath();c.arc(rx*w,ry*h,1,0,Math.PI*2);c.fill();});
    c.strokeStyle='rgba(180,150,230,.55)';c.lineWidth=.8;
    c.beginPath();c.arc(w/2,h*.44,w*.38,Math.PI,Math.PI*2);c.stroke();
  },
  longway:(c,w,h)=>{
    c.fillStyle='#3a1010';c.fillRect(0,0,w,h);
    c.fillStyle='rgba(255,230,200,.6)';
    [[.15,.1],[.8,.15],[.55,.08],[.3,.22],[.7,.28],[.1,.4],[.88,.35]].forEach(([rx,ry])=>{c.beginPath();c.arc(rx*w,ry*h,.8,0,Math.PI*2);c.fill();});
    const px=w/2,py=h*.42,pr=Math.min(w*.32,11);
    c.fillStyle='rgba(200,120,80,.8)';c.beginPath();c.arc(px,py,pr,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(240,190,130,.55)';c.lineWidth=1.2;
    c.beginPath();c.ellipse(px,py,pr*1.7,pr*.4,.2,0,Math.PI*2);c.stroke();
    c.strokeStyle='rgba(255,180,130,.2)';c.lineWidth=.6;
    for(let i=0;i<4;i++){const y=h*(.62+i*.07);c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  },
  demoncopp:(c,w,h)=>{
    c.fillStyle='#1c3530';c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(255,255,255,.05)';c.lineWidth=.5;
    for(let y=0;y<h;y+=8){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
    c.fillStyle='rgba(40,80,70,.7)';
    c.beginPath();c.moveTo(0,h*.75);c.quadraticCurveTo(w*.25,h*.55,w*.5,h*.68);c.quadraticCurveTo(w*.75,h*.8,w,h*.62);c.lineTo(w,h);c.lineTo(0,h);c.closePath();c.fill();
    c.fillStyle='rgba(25,60,50,.6)';
    c.beginPath();c.moveTo(0,h*.85);c.quadraticCurveTo(w*.3,h*.72,w*.6,h*.8);c.quadraticCurveTo(w*.8,h*.88,w,h*.76);c.lineTo(w,h);c.lineTo(0,h);c.closePath();c.fill();
    c.strokeStyle='rgba(160,210,180,.65)';c.lineWidth=1.4;
    c.beginPath();c.moveTo(w*.2,h*.3);c.bezierCurveTo(w*.7,h*.25,w*.1,h*.5,w*.75,h*.58);c.stroke();
    c.fillStyle='rgba(160,210,180,.7)';c.beginPath();c.arc(w*.2,h*.3,2,0,Math.PI*2);c.fill();
  }
};

const BOOKS=[
  {id:'wotm',shelf:'read',title:'The Will of the Many',author:'James Islington',pages:672,rating:5,wantToRead:false,genre:'Epic Fantasy',gc:{bg:'#EEEDFE',t:'#3C3489',b:'#534AB7'},text:"A masterclass in slow-burn dark academia fantasy. Islington builds a Roman-inspired world where \"Will\" — your mental and physical energy — is literally leeched upward by the ruling class. Protagonist Vis navigates a cutthroat academy while harbouring a dangerous secret identity. Meticulous plotting, a stunning ending, and one of the best magic systems in years.",verdict:'A towering debut saga — Rothfuss fans, this is your next obsession.',vc:'#2e3f8a'},
  {id:'pachinko',shelf:'read',title:'Pachinko',author:'Min Jin Lee',pages:496,rating:5,wantToRead:false,genre:'Literary Fiction',gc:{bg:'#E1F5EE',t:'#085041',b:'#0F6E56'},text:"Four generations of a Korean family navigating discrimination, survival, and identity in 20th-century Japan. Spare, unadorned prose that carries immense emotional weight. It spans almost a century without losing intimacy with its characters. Devastating and life-affirming in equal measure.",verdict:'One of the great novels of the century. Read it slowly.',vc:'#1a4a42'},
  {id:'redrising',shelf:'read',title:'Red Rising',author:'Pierce Brown',pages:382,rating:4,wantToRead:false,genre:'Sci-Fi / Dystopia',gc:{bg:'#FCEBEB',t:'#791F1F',b:'#A32D2D'},text:"Darrow, a Red-caste miner on Mars, goes undercover among the Gold ruling class to tear their society down from within. Brown writes action with cinematic fury — The Hunger Games crossed with a Roman epic. Fast, brutal, propulsive, and more emotionally resonant than it has any right to be.",verdict:'Explosive genre fiction with genuine heart.',vc:'#7a1010'},
  {id:'babel',shelf:'want',title:'Babel',author:'R.F. Kuang',pages:546,rating:0,wantToRead:true,genre:'Dark Academia',gc:{bg:'#EEEDFE',t:'#3C3489',b:'#534AB7'},text:"Set in 1830s Oxford, this dark academia fantasy explores how empire is encoded in language itself. Translation magic, colonial violence, and a cast of students from colonised nations slowly realising the institution they love was built on their subjugation. Kuang at her most ambitious.",verdict:'On the list for its reputation as a genre-defining read.',vc:'#3a1a6e'},
  {id:'longway',shelf:'want',title:'The Long Way to a Small, Angry Planet',author:'Becky Chambers',pages:404,rating:0,wantToRead:true,genre:'Cosy Sci-Fi',gc:{bg:'#FAECE7',t:'#4A1B0C',b:'#993C1D'},text:"A crew of misfits tunnel through deep space in a slow, warm, character-driven sci-fi that prioritises found family over action. The antidote to grim dystopias — Chambers makes you feel the universe is a welcoming place full of people worth knowing.",verdict:'Perfect for when you want sci-fi that feels like a hug.',vc:'#6a2010'},
  {id:'demoncopp',shelf:'want',title:'Demon Copperhead',author:'Barbara Kingsolver',pages:560,rating:0,wantToRead:true,genre:'Literary Fiction',gc:{bg:'#EAF3DE',t:'#27500A',b:'#3B6D11'},text:"A Pulitzer Prize-winning retelling of David Copperfield set in the opioid-ravaged Appalachian mountains. Kingsolver gives voice to a community rarely seen in literary fiction with fierce urgency and Dickensian sweep. Devastating and brilliant.",verdict:"Pulitzer-winning and on every 'best of the decade' list already.",vc:'#1c3530'}
];

function buildShelf(shelfId,books){
  const shelf=document.getElementById(shelfId);
  books.forEach(b=>{
    const w=pw(b.pages),h=130+Math.round((b.pages/BASE)*50);
    const div=document.createElement('div');
    div.className='book';div.id='book-'+b.id;div.title=b.title;
    div.onclick=()=>openReview(b.id);
    let inner=`<div class="book-body" style="width:${w}px;height:${h}px;"><canvas width="${w}" height="${h}" style="position:absolute;inset:0;width:100%;height:100%;"></canvas><div class="book-label"><span>${b.title}</span></div><div class="book-pages"></div></div>`;
    if(b.wantToRead) inner='<div class="bm"></div>'+inner;
    div.innerHTML=inner;
    shelf.appendChild(div);
    const canvas=div.querySelector('canvas');
    const ctx=canvas.getContext('2d');
    painters[b.id](ctx,w,h);
  });
}

buildShelf('sr',BOOKS.filter(b=>b.shelf==='read'));
buildShelf('sw',BOOKS.filter(b=>b.shelf==='want'));

function starSVG(f){return `<svg class="star" viewBox="0 0 13 13" fill="${f?'#e8a020':'none'}" stroke="#e8a020" stroke-width="1.2"><polygon points="6.5,1 8.1,4.8 12.5,5.2 9.3,8 10.3,12.3 6.5,10 2.7,12.3 3.7,8 0.5,5.2 4.9,4.8"/></svg>`;}

function openReview(id){
  const b=BOOKS.find(x=>x.id===id);
  document.getElementById('rv-t').textContent=b.title;
  document.getElementById('rv-a').textContent=b.author;
  document.getElementById('rv-p').textContent=b.pages+' pages';
  const mc=document.getElementById('rv-c');
  painters[b.id](mc.getContext('2d'),32,50);
  document.getElementById('rv-s').innerHTML=b.wantToRead?'':Array.from({length:5},(_,i)=>starSVG(i<b.rating)).join('');
  const tag=document.getElementById('rv-tag');
  if(b.wantToRead){tag.textContent='Want to read';tag.style.cssText='background:#FAEEDA;color:#633806;border:.5px solid #854F0B;';}
  else{tag.textContent=b.genre;tag.style.cssText=`background:${b.gc.bg};color:${b.gc.t};border:.5px solid ${b.gc.b};`;}
  document.getElementById('rv-tx').textContent=b.text;
  const v=document.getElementById('rv-v');v.textContent=b.verdict;v.style.borderColor=b.vc;
  document.getElementById('book-'+id).classList.add('open');
  document.getElementById('overlay').classList.add('active');
}
function closeOverlay(){document.getElementById('overlay').classList.remove('active');document.querySelectorAll('.book').forEach(b=>b.classList.remove('open'));}
function maybeClose(e){if(e.target===document.getElementById('overlay'))closeOverlay();}
</script>
